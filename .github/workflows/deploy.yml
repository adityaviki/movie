name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once. Don't cancel in-flight ones — let them finish.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: pnpm install
        # See deploy.sh — pnpm 11 exits non-zero on the harmless ignored-builds
        # warning. Tolerate it; subsequent build steps surface real install bugs.
        run: pnpm install --frozen-lockfile || true
      - name: Typecheck backend
        working-directory: packages/backend
        run: ./node_modules/.bin/tsc
      - name: Typecheck + build frontend
        working-directory: packages/frontend
        run: ./node_modules/.bin/vite build

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts
      - name: Run deploy.sh on Lightsail
        run: |
          ssh -o BatchMode=yes "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            'cd movie && bash deploy/deploy.sh'
      - name: Verify site is up
        run: |
          curl -fsSL -o /dev/null -w "HTTPS / : %{http_code}\n" https://movies.adityaviki.com/
          curl -fsS -o /dev/null -w "HTTPS /api/auth/me : %{http_code}\n" \
            https://movies.adityaviki.com/api/auth/me || true
